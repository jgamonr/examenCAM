<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bienvenida - Examen CAM</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #eaf6ff, #d7ebf7);
      color: #1f2d3d;
    }

    .contenedor {
      width: 90%;
      max-width: 600px;
      background: #ffffff;
      border-radius: 18px;
      padding: 36px 28px;
      text-align: center;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.15);
      border: 1px solid #d6e4ef;
    }

    .logo {
      width: 180px;
      max-width: 70%;
      height: auto;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 2rem;
      color: #1b3b5a;
    }

    p {
      margin: 10px 0;
      font-size: 1.08rem;
      line-height: 1.6;
      color: #3d556b;
    }

    .aviso {
      margin-top: 22px;
      display: inline-block;
      padding: 12px 18px;
      border-radius: 10px;
      background: #eef7ff;
      border: 1px solid #bfd9ee;
      color: #1b4f72;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="contenedor">
    <img src="logo CAM.png" alt="Logo del Club Alpino Mexicano" class="logo" />
    <h1>Bienvenido al Examen</h1>
    <p><strong>Club Alpino Mexicano A.C.</strong></p>
    <p>En breve se cargará el examen.</p>
    <p>Por favor, espere unos momentos y permanezca en esta página.</p>
    <div class="aviso">Preparando contenido...</div>
  </div>
</body>
</html>
