<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="refresh" content="3; url=https://forms.gle/DKdsQZqrMqzBqob77" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bienvenida - Examen CAM</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #e8e0c8, #d8ccb0);
      color: #2f4a2f;
    }

    .contenedor {
      width: 90%;
      max-width: 600px;
      background: #f7f1df;
      border-radius: 18px;
      padding: 36px 28px;
      text-align: center;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.15);
      border: 1px solid #b8c7a3;
    }

    .logo {
      width: 180px;
      max-width: 70%;
      height: auto;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 2rem;
      color: #3d5a2a;
    }

    p {
      margin: 10px 0;
      font-size: 1.08rem;
      line-height: 1.6;
      color: #556b3f;
    }

    .aviso {
      margin-top: 22px;
      display: inline-block;
      padding: 12px 18px;
      border-radius: 10px;
      background: #e3ecd2;
      border: 1px solid #a9bb8c;
      color: #486334;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="contenedor">
    <img src="logo CAM.png" alt="Logo del Club Alpino Mexicano" class="logo" />
    <h1>Bienvenido al Examen</h1>
    <p><strong>Club Alpino Mexicano, Delegación Baja California</strong></p>
    <p>En breve se cargará el examen.</p>
    <p>Será redirigido automáticamente al formulario en unos segundos.</p>
    <div class="aviso">Redirigiendo...</div>
  </div>
</body>
</html>
